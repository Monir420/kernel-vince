name: ReLIFE Kernel CI (vince)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      KERNEL_NAME: ReLIFE
      ARCH: arm
      SUBARCH: arm
      TZ: Asia/Dhaka

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git curl wget zip unzip bc bison flex \
            build-essential libssl-dev libncurses5-dev \
            python3 python3-pip

      - name: Clone Clang
        run: |
          git clone --depth=1 https://github.com/llvm/llvm-project clang

      - name: Setup PATH
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "PATH=$PWD/clang/bin:$PATH" >> $GITHUB_ENV

      - name: Detect defconfig
        run: |
          echo "Listing configs:"
          ls arch/arm64/configs || true

          if [ -f arch/arm64/configs/vince_defconfig ]; then
              echo "KERNEL_DEFCONFIG=vince_defconfig" >> $GITHUB_ENV
          elif [ -f arch/arm64/configs/msm8953_defconfig ]; then
              echo "KERNEL_DEFCONFIG=msm8953_defconfig" >> $GITHUB_ENV
          elif [ -f arch/arm64/configs/lineage_vince_defconfig ]; then
              echo "KERNEL_DEFCONFIG=lineage_vince_defconfig" >> $GITHUB_ENV
          else
              echo "ERROR: No valid defconfig found"
              exit 1
          fi

      - name: Kernel defconfig
        run: |
          make O=out ARCH=arm64 $KERNEL_DEFCONFIG

      - name: Build kernel
        run: |
          make -j$(nproc --all) \
            O=out \
            ARCH=arm \
            CC=clang \
            CROSS_COMPILE=arm-linux-androidkernel- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            2>&1 | tee build.log

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel
          cp out/arch/arm/boot/Image.gz-dtb anykernel/ || true

      - name: Create ZIP
        run: |
          cd anykernel
          zip -r9 ReLIFE-Kernel-vince.zip ./*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ReLIFE-Kernel-vince
          path: |
            anykernel/*.zip
            build.log
