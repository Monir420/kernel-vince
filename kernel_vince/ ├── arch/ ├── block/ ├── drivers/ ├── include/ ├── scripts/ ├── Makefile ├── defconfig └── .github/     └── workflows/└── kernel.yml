name: ReLIFE Kernel CI (vince)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      KERNEL_NAME: ReLIFE
      ARCH: arm
      SUBARCH: arm
      KERNEL_DEFCONFIG: vince_defconfig
      TZ: Asia/Dhaka

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git curl wget zip unzip bc bison flex \
            build-essential libssl-dev libncurses5-dev \
            python3 python3-pip

      - name: Clone Clang (WeebX-style)
        run: |
          git clone --depth=1 https://github.com/llvm/llvm-project clang

      - name: Setup PATH
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "CLANG_PATH=$PWD/clang" >> $GITHUB_ENV
          echo "PATH=$PWD/clang/bin:$PATH" >> $GITHUB_ENV

      - name: Kernel defconfig
        run: |
          make O=out ARCH=arm $KERNEL_DEFCONFIG

      - name: Build kernel
        run: |
          make -j$(nproc --all) \
            O=out \
            ARCH=arm \
            CC=clang \
            CROSS_COMPILE=arm-linux-androidkernel- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            2>&1 | tee build.log

      - name: Package Image
        run: |
          mkdir -p AnyKernel3
          cp out/arch/arm/boot/Image.gz-dtb AnyKernel3/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ReLIFE-Kernel-vince
          path: |
            out/arch/arm/boot/*
            build.log
